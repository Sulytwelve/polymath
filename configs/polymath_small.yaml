# PolyMath Small (~200M parameters, Anthropic reverse-engineered Mythos RDT + Kimi AttnRes + DeepSeek MLA + MoE)
model:
  d_model: 768
  n_heads: 12
  n_kv_heads: 4
  d_ff: 2048
  n_layers: 6  # NOTE: unused in polymath mode (uses prelude_layers + 1 recurrent + coda_layers)
  max_seq_len: 1024
  rope_theta: 10000.0
  mode: polymath
  attn_res_mode: full
  attn_type: mla
  kv_lora_rank: 128
  qk_rope_head_dim: 32
  ffn_type: moe
  n_experts: 8
  n_experts_per_tok: 2
  prelude_layers: 2
  coda_layers: 2
  max_loop_iters: 8
  uniform_loop_sampling: true
  lora_rank: 32
  qk_norm: true
  dropout: 0.1

train:
  batch_size: 32
  gradient_accumulation_steps: 4
  max_iters: 10000
  lr: 0.0006
  min_lr: 0.00006
  warmup_iters: 500
  weight_decay: 0.1
  grad_clip: 1.0
  use_amp: true
  eval_interval: 500
  eval_iters: 20
  log_interval: 20
  checkpoint_dir: checkpoints

tokenizer:
  tokenizer_type: tiktoken
  tiktoken_encoding: cl100k_base

data:
  dataset_type: mmap
  mmap_data_dir: data
