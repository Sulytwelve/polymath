model:
  d_model: 288
  n_heads: 6
  n_kv_heads: 6
  d_ff: 768
  n_layers: 6
  max_seq_len: 256
  rope_theta: 10000.0
  mode: standard
  qk_norm: true
  dropout: 0.0

train:
  batch_size: 32
  gradient_accumulation_steps: 1
  max_iters: 500
  lr: 0.0005
  min_lr: 0.00005
  warmup_iters: 50
  weight_decay: 0.01
  grad_clip: 1.0
  use_amp: true
  eval_interval: 100
  eval_iters: 10
  log_interval: 10
  checkpoint_dir: checkpoints

tokenizer:
  tokenizer_type: char
  tiktoken_encoding: cl100k_base

data:
  dataset_type: char_memory
  input_file: null
