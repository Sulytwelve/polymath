model:
  d_model: 2048
  n_heads: 32
  n_kv_heads: 8
  d_ff: 5632
  n_layers: 24
  max_seq_len: 4096
  rope_theta: 500000.0
  mode: standard
  qk_norm: true
  dropout: 0.1

train:
  batch_size: 8
  gradient_accumulation_steps: 16
  max_iters: 100000
  lr: 0.0002
  min_lr: 0.00002
  warmup_iters: 4000
  weight_decay: 0.1
  grad_clip: 1.0
  use_amp: true
  eval_interval: 2000
  eval_iters: 50
  log_interval: 50
  checkpoint_dir: checkpoints

tokenizer:
  tokenizer_type: tiktoken
  tiktoken_encoding: cl100k_base

data:
  dataset_type: mmap
  mmap_data_dir: data
