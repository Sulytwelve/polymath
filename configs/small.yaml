model:
  d_model: 768
  n_heads: 12
  n_kv_heads: 4
  d_ff: 2048
  n_layers: 12
  max_seq_len: 1024
  rope_theta: 10000.0
  mode: standard
  qk_norm: true
  dropout: 0.1

train:
  batch_size: 32
  gradient_accumulation_steps: 4
  max_iters: 10000
  lr: 0.0006
  min_lr: 0.00006
  warmup_iters: 500
  weight_decay: 0.1
  grad_clip: 1.0
  use_amp: true
  eval_interval: 500
  eval_iters: 20
  log_interval: 20
  checkpoint_dir: checkpoints

tokenizer:
  tokenizer_type: tiktoken
  tiktoken_encoding: cl100k_base

data:
  dataset_type: mmap
  mmap_data_dir: data
