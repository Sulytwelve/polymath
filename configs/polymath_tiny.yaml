model:
  vocab_size: 4096
  d_model: 512
  n_heads: 8
  n_kv_heads: 4
  d_ff: 2048
  n_layers: 6
  max_seq_len: 256
  rope_theta: 10000.0
  mode: polymath
  attn_res_mode: full
  attn_type: mla
  kv_lora_rank: 128
  qk_rope_head_dim: 32
  prelude_layers: 2
  coda_layers: 2
  max_loop_iters: 6
  uniform_loop_sampling: true
  lora_rank: 32
  qk_norm: true
  dropout: 0.1

train:
  batch_size: 16
  gradient_accumulation_steps: 8
  max_iters: 5000
  lr: 0.0003
  min_lr: 0.0001
  warmup_iters: 100
  weight_decay: 0.1
  grad_clip: 1.0
  use_amp: true
  eval_interval: 200
  eval_iters: 10
  log_interval: 10
  checkpoint_dir: checkpoints

tokenizer:
  tokenizer_type: custom_bpe
  tiktoken_encoding: configs/tokenizer.json

data:
  dataset_type: mmap
  mmap_data_dir: data
